name: Full Enterprise Security Scan

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '0 0 * * *' # Her gece çalıştır

jobs:
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep Scan
        run: |
          pip install semgrep
          semgrep scan --config p/owasp-top-ten --config p/security-audit --error

  codeql:
    name: Advanced SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-check:
    name: Dependency Scan (OSV & Pip-Audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run Pip-Audit
        run: |
          pip install pip-audit
          pip-audit -r anket_sistemi/requirements.txt
      - name: Run OSV Scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner -r anket_sistemi || true

  deploy:
    name: Enterprise Deployment (VPS)
    needs: [gitleaks, semgrep, codeql, dependency-check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/anket_sistemi
            git fetch origin master
            git reset --hard origin/master
            
            # .env dosyasını GitHub Secrets'tan gelen verilerle güncelle
            # Not: Bu adım mevcut .env dosyasını GitHub'daki güvenli versiyonla değiştirir.
            cat <<EOF > .env
            ${{ secrets.ENV_CONTENT }}
            EOF
            
            # Bağımlılıkları güncelle ve servisi yeniden başlat
            ./venv/bin/pip install -r anket_sistemi/requirements.txt
            systemctl restart anket
            systemctl restart nginx
