server {
    # Deny access to hidden files (dotfiles)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    # Deny access to sensitive config files
    location ~* (\.env|\.git|\.htaccess|config/database\.yml) {
        deny all;
        access_log off;
        log_not_found off;
    }
    # Path Obfuscation & Security
    location ~ ^/(admin|login|swagger-ui) { return 404; }
    location /secure-mrt-admin {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        include proxy_params;
        proxy_pass http://unix:/root/anket_sistemi/anket.sock;
    }
    location /secure-mrt-auth {
        include proxy_params;
        proxy_pass http://unix:/root/anket_sistemi/anket.sock;
    }
    server_tokens off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
    server_name irt.mindsight.com.tr 213.202.211.21;

    location / {
        include proxy_params;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
        proxy_pass http://unix:/root/anket_sistemi/anket.sock;
    }

    location /static/ {
        alias /root/anket_sistemi/static/;
    }

    location /output/ {
        alias /root/anket_sistemi/output/;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/irt.mindsight.com.tr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/irt.mindsight.com.tr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    server_tokens off;
    # Path Obfuscation & Security
    location ~ ^/(admin|login|swagger-ui) { return 404; }
    location /secure-mrt-admin {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        include proxy_params;
        proxy_pass http://unix:/root/anket_sistemi/anket.sock;
    }
    location /secure-mrt-auth {
        include proxy_params;
        proxy_pass http://unix:/root/anket_sistemi/anket.sock;
    }
    if ($host = irt.mindsight.com.tr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name irt.mindsight.com.tr 213.202.211.21;
    return 404; # managed by Certbot


}
